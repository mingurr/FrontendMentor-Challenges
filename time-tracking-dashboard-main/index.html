<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./style.css" />
    <script defer src="./main.js"></script>

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main>
      <section class="profile-contatiner">
        <div class="profile">
          <img src="./images/image-jeremy.png" alt="profile picture" />
          <div class="text-preset-4">
            <span class="text-preset-6">Report for</span> Jeremy Robson
          </div>
        </div>
        <nav class="category">
          <ul>
            <li><button class="text-preset-5-regular">Daily</button></li>
            <li><button class="text-preset-5-regular">Weekly</button></li>
            <li><button class="text-preset-5-regular">Monthly</button></li>
          </ul>
        </nav>
      </section>
      <section class="cards-container">
        <div class="card-container">
          <button class="text-preset-5-medium">Work</button>
          <div class="card-stats">
            <div class="current text-preset-1">36hrs</div>
            <div class="previous text-preset-6">
              Last Week <span>36hrs</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
